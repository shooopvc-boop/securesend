<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureSend</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #09090b;
    color: #a1a1aa;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 1.5rem;
  }

  .container {
    width: 100%;
    max-width: 560px;
  }

  h1 {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    color: #a1a1aa;
    text-align: center;
  }

  .tagline {
    font-size: 0.8rem;
    color: #52525b;
    text-align: center;
    margin-top: 1.5rem;
    font-style: italic;
  }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  a {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    height: 160px;
    border: 1px solid #27272a;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: #71717a;
    text-decoration: none;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  a::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
    border-radius: 8px;
  }

  a::before {
    background: radial-gradient(ellipse at 50% 80%, rgba(161, 161, 170, 0.06) 0%, transparent 70%);
  }

  a:hover::before {
    opacity: 1;
  }

  a:hover {
    border-color: #3f3f46;
    color: #d4d4d8;
  }

  a.encrypt:hover,
  a.decrypt:hover {
    border-color: #52525b;
    color: #fafafa;
  }

  a:active {
    transform: scale(0.97);
    transition: transform 0.1s ease;
  }

  .icon {
    width: 32px;
    height: 32px;
    stroke-width: 1.5;
    transition: transform 0.3s ease;
  }

  a:hover .icon {
    transform: translateY(-2px);
  }

  .icon { stroke: #71717a; transition: stroke 0.3s ease, transform 0.3s ease; }
  a:hover .icon { stroke: #d4d4d8; }

  @media (max-width: 400px) {
    .options {
      grid-template-columns: 1fr;
    }
    a { height: 120px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Shooop SecureSend</h1>
  <div class="options">
    <a href="encrypt.html" class="encrypt">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Encrypt
    </a>
    <a href="decrypt.html" class="decrypt">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
      </svg>
      Decrypt
    </a>
  </div>
  <p class="tagline">for when you want to avoid snooops</p>
</div>
</body>
</html>
